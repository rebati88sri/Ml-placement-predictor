<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Prediction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .input-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        
        .result.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .result.failure {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .result h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .result p {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Placement Prediction</h1>
        <form id="predictionForm">
            <div class="input-group">
                <label for="cgpa">CGPA (0 - 10)</label>
                <input type="number" id="cgpa" name="cgpa" step="0.1" min="0" max="10" required placeholder="Enter your CGPA">
            </div>
            <div class="input-group">
                <label for="iq">IQ Level</label>
                <input type="number" id="iq" name="iq" min="0" required placeholder="Enter your IQ">
            </div>
            <button type="submit">Predict Placement</button>
        </form>
        
        <div id="result" class="result">
            <h2 id="resultTitle"></h2>
            <p id="resultMessage"></p>
        </div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const cgpa = document.getElementById('cgpa').value;
            const iq = document.getElementById('iq').value;
            const resultDiv = document.getElementById('result');
            const resultTitle = document.getElementById('resultTitle');
            const resultMessage = document.getElementById('resultMessage');
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ cgpa: parseFloat(cgpa), iq: parseFloat(iq) }),
                });
                
                const data = await response.json();
                
                resultDiv.classList.remove('success', 'failure');
                
                if (data.prediction === 1) {
                    resultDiv.classList.add('success');
                    resultTitle.textContent = '✅ Placement Hoga!';
                    resultMessage.textContent = 'Congratulations! Based on your CGPA and IQ, you are likely to get placed.';
                } else {
                    resultDiv.classList.add('failure');
                    resultTitle.textContent = '❌ Placement Nahi Hoga';
                    resultMessage.textContent = 'Sorry! Based on your CGPA and IQ, you may not get placed. Keep working on your skills!';
                }
                
                resultDiv.style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                alert('Something went wrong. Please try again.');
            }
        });
    </script>
</body>
</html>
